# Barcha konteynerlar uchun log rotatsiyasi (disk to'lib qolmasligi uchun)
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      # Konteyner ichida MongoDB va Redis'ga service nomlari orqali ulanamiz
      # (bu qiymatlar .env dagi localhost qiymatlarini bekor qiladi)
      MONGO_URI: mongodb://mongo:27017/connector-bot
      REDIS_URL: redis://redis:6379
      WEB_PORT: 3000
    # Funnel dashboard web-serveri. Hozircha faqat localhost'ga ochiq (xavfsiz).
    # Domen ulanganda Caddy/nginx orqali HTTPS bilan public qilinadi.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # HTTPS reverse-proxy: connecterbot.duckdns.org uchun bepul avtomatik SSL.
  caddy:
    image: caddy:2
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot

volumes:
  mongo_data:
  redis_data:
  caddy_data:
  caddy_config:
