<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Voronka analitikasi</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #17212b);
      --card: var(--tg-theme-secondary-bg-color, #232e3c);
      --text: var(--tg-theme-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #7d8b99);
      --accent: var(--tg-theme-button-color, #3390ec);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      padding: 16px; -webkit-font-smoothing: antialiased;
    }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .sub { color: var(--hint); font-size: 13px; margin-bottom: 16px; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .tag {
      padding: 8px 14px; border-radius: 20px; background: var(--card);
      color: var(--text); font-size: 14px; cursor: pointer; border: 1px solid transparent;
      transition: all .15s;
    }
    .tag.active { background: var(--accent); color: var(--accent-text); }
    .stats { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat {
      flex: 1; background: var(--card); border-radius: 14px; padding: 14px;
      text-align: center;
    }
    .stat .num { font-size: 26px; font-weight: 700; }
    .stat .lbl { font-size: 12px; color: var(--hint); margin-top: 2px; }
    .step { background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    .step-head { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
    .step-head .cnt { color: var(--hint); }
    .track { height: 10px; background: rgba(125,139,153,.25); border-radius: 6px; overflow: hidden; }
    .fill { height: 100%; background: var(--accent); border-radius: 6px; transition: width .5s ease; }
    .click { font-size: 12px; color: #66bb6a; margin-top: 6px; }
    .wait { font-size: 12px; color: var(--hint); margin-top: 6px; }
    .drop { font-size: 12px; color: #e57373; margin-top: 6px; }
    .section-title { font-size: 14px; font-weight: 600; margin: 22px 0 10px; }
    .chart { background: var(--card); border-radius: 12px; padding: 12px; }
    .chart svg { height: 110px; display: block; }
    .chart-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--hint); margin-top: 6px; }
    .empty, .error { text-align: center; color: var(--hint); padding: 40px 0; font-size: 14px; }
    .loader { text-align: center; padding: 40px 0; color: var(--hint); }
  </style>
</head>
<body>
  <h1>📊 Voronka analitikasi</h1>
  <div class="sub" id="subtitle">Tagni tanlang</div>
  <div class="tags" id="tags"></div>
  <div id="content"><div class="loader">Yuklanmoqda…</div></div>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();

    const initData = tg?.initData || "";
    const headers = { "X-Telegram-Init-Data": initData };

    const tagsEl = document.getElementById("tags");
    const contentEl = document.getElementById("content");
    const subEl = document.getElementById("subtitle");
    let activeTag = null;

    async function api(path) {
      const res = await fetch(path, { headers });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }

    function pct(count, base) {
      if (!base) return 0;
      return Math.round((count / base) * 100);
    }

    function renderFunnel(data) {
      const steps = data.steps || [];
      const conv = steps.length ? steps[steps.length - 1].reachPct : 0;

      let html = `
        <div class="stats">
          <div class="stat"><div class="num">${data.started}</div><div class="lbl">Boshlaganlar</div></div>
          <div class="stat"><div class="num">${conv}%</div><div class="lbl">Konversiya</div></div>
        </div>`;

      if (!steps.length) {
        html += `<div class="empty">Bu tag uchun hali xabar yo'q.</div>`;
        return html;
      }

      steps.forEach((s, i) => {
        html += `
          <div class="step">
            <div class="step-head"><span>#${i + 1}-xabar</span><span class="cnt">${s.delivered}/${s.matured} · ${s.reachPct}%</span></div>
            <div class="track"><div class="fill" style="width:${s.reachPct}%"></div></div>
            ${s.clicked > 0 ? `<div class="click">👆 Bosgan: ${s.clicked} kishi · CTR ${s.ctr}%</div>` : ``}
            ${s.waiting > 0 ? `<div class="wait">⏳ Kutmoqda: ${s.waiting} kishi</div>` : ``}
          </div>`;
      });
      return html;
    }

    function renderTrend(data) {
      const days = data.days || [];
      if (!days.length) return "";
      const max = Math.max(1, ...days.map(d => d.started));
      const W = 320, H = 110, pad = 16;
      const bw = (W - pad * 2) / days.length;
      let bars = "";
      days.forEach((d, i) => {
        const h = (d.started / max) * (H - pad * 2);
        const x = pad + i * bw;
        const y = H - pad - h;
        bars += `<rect x="${x + 1}" y="${y}" width="${Math.max(1, bw - 2)}" height="${h}" rx="2" fill="var(--accent)"></rect>`;
        if (d.clicked > 0) {
          const ch = (d.clicked / max) * (H - pad * 2);
          bars += `<rect x="${x + 1}" y="${H - pad - ch}" width="${Math.max(1, bw - 2)}" height="${ch}" rx="2" fill="#66bb6a"></rect>`;
        }
      });
      const total = days.reduce((s, d) => s + d.started, 0);
      return `
        <div class="section-title">📈 Kunlik yangi foydalanuvchilar · ${days.length} kun (jami ${total})</div>
        <div class="chart">
          <svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none">${bars}</svg>
          <div class="chart-labels"><span>${days[0].date.slice(5)}</span><span>👆 klik</span><span>${days[days.length - 1].date.slice(5)}</span></div>
        </div>`;
    }

    async function loadFunnel(tag) {
      activeTag = tag;
      subEl.textContent = `"${tag}" tahlili`;
      [...tagsEl.children].forEach(c => c.classList.toggle("active", c.dataset.tag === tag));
      contentEl.innerHTML = `<div class="loader">Yuklanmoqda…</div>`;
      try {
        const [funnel, trend] = await Promise.all([
          api(`/api/funnel/${encodeURIComponent(tag)}`),
          api(`/api/trend/${encodeURIComponent(tag)}`),
        ]);
        contentEl.innerHTML = renderFunnel(funnel) + renderTrend(trend);
      } catch (e) {
        contentEl.innerHTML = `<div class="error">Xatolik: ${e.message}</div>`;
      }
    }

    async function init() {
      try {
        const { tags } = await api("/api/tags");
        if (!tags.length) {
          tagsEl.innerHTML = "";
          contentEl.innerHTML = `<div class="empty">Hali hech qanday tag yo'q.<br>Botda /setcontent orqali kontent yarating.</div>`;
          subEl.textContent = "";
          return;
        }
        tagsEl.innerHTML = "";
        tags.forEach(t => {
          const el = document.createElement("div");
          el.className = "tag";
          el.textContent = t;
          el.dataset.tag = t;
          el.onclick = () => loadFunnel(t);
          tagsEl.appendChild(el);
        });
        loadFunnel(tags[0]);
      } catch (e) {
        contentEl.innerHTML = `<div class="error">Kirish rad etildi yoki xatolik: ${e.message}<br><br>Bu panelni bot ichidagi tugma orqali oching.</div>`;
      }
    }

    init();
  </script>
</body>
</html>
